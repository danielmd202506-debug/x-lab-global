<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="X-LAB supplier portal login for vendor operations.">
  <title>X-LAB Supplier Login</title>
  <style>
    :root {
      --bg: #050607;
      --panel: #111418;
      --ink: #f6f8fa;
      --muted: #aab1b8;
      --line: rgba(255,255,255,.14);
      --red: #d91f2d;
      --cyan: #53c7df;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(90deg, rgba(5,6,7,.96), rgba(5,6,7,.74)),
        radial-gradient(circle at 82% 18%, rgba(83,199,223,.22), transparent 34%),
        radial-gradient(circle at 20% 80%, rgba(217,31,45,.2), transparent 32%),
        #050607;
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
    }
    a { color: inherit; text-decoration: none; }
    .login {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(340px, .72fr);
      border: 1px solid var(--line);
      background: rgba(17,20,24,.82);
      box-shadow: 0 30px 90px rgba(0,0,0,.38);
    }
    .intro, .form {
      padding: clamp(28px, 5vw, 56px);
    }
    .intro {
      border-right: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
    }
    .logo { width: 132px; height: 30px; object-fit: contain; object-position: left center; margin-bottom: 70px; }
    .eyebrow {
      color: var(--cyan);
      text-transform: uppercase;
      font-weight: 900;
      font-size: 12px;
      letter-spacing: .16em;
    }
    h1 {
      margin: 16px 0 22px;
      font-size: clamp(46px, 7vw, 84px);
      line-height: .9;
      letter-spacing: 0;
    }
    p { color: var(--muted); line-height: 1.65; margin: 0; }
    .hint {
      margin-top: 34px;
      padding: 16px;
      border: 1px solid rgba(83,199,223,.28);
      background: rgba(83,199,223,.08);
      color: rgba(255,255,255,.82);
      font-size: 14px;
    }
    .form { display: grid; align-content: center; }
    label {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    input, select {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      border: 1px solid var(--line);
      background: #080a0c;
      color: #fff;
    }
    .btn {
      width: 100%;
      min-height: 50px;
      border: 1px solid var(--red);
      background: var(--red);
      color: #fff;
      cursor: pointer;
      font-weight: 800;
    }
    .secondary {
      display: inline-flex;
      margin-top: 16px;
      color: var(--muted);
      font-size: 14px;
    }
    .error {
      min-height: 24px;
      margin: 12px 0 0;
      color: #ff7780;
      font-size: 14px;
    }
    @media (max-width: 760px) {
      .login { grid-template-columns: 1fr; }
      .intro { border-right: 0; border-bottom: 1px solid var(--line); }
      .logo { margin-bottom: 36px; }
    }
  </style>
</head>
<body>
  <main class="login">
    <section class="intro">
      <img class="logo" src="assets/x-lab-logo.webp" alt="X-LAB">
      <div class="eyebrow">Supplier Portal</div>
      <h1>Secure vendor workspace.</h1>
      <p>Login to check purchase orders, shipment tasks, material requirements, compliance files and collaboration requests.</p>
      <div class="hint">Demo account: <strong>supplier@x-lab.global</strong><br>Password: <strong>supplier123</strong></div>
    </section>
    <form class="form" id="loginForm">
      <label>Account type
        <select id="role">
          <option value="supplier" selected>Supplier</option>
          <option value="partner">Channel Partner</option>
        </select>
      </label>
      <label>Email
        <input id="email" type="email" value="supplier@x-lab.global" autocomplete="username" required>
      </label>
      <label>Password
        <input id="password" type="password" value="supplier123" autocomplete="current-password" required>
      </label>
      <button class="btn" type="submit">Log In</button>
      <div class="error" id="error" role="alert"></div>
      <a class="secondary" href="partner-portal.html">Back to B2B Portal</a>
    </form>
  </main>
  <script>
    const accounts = {
      "supplier@x-lab.global": { password: "supplier123", name: "CarbonWorks Supplier", role: "supplier" },
      "partner@x-lab.global": { password: "partner123", name: "Velocity Partner", role: "partner" }
    };
    document.getElementById("loginForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;
      const selectedRole = document.getElementById("role").value;
      const account = accounts[email];
      if (!account || account.password !== password || account.role !== selectedRole) {
        document.getElementById("error").textContent = "Invalid account, password or account type.";
        return;
      }
      sessionStorage.setItem("xlabSupplierSession", JSON.stringify({
        email,
        name: account.name,
        role: account.role,
        loginAt: new Date().toISOString()
      }));
      window.location.href = "supplier-dashboard.html";
    });
  </script>
</body>
</html>
